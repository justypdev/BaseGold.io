<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <!-- Main coin gradient - metallic gold -->
    <radialGradient id="coinBase" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FFE566"/>
      <stop offset="40%" style="stop-color:#D4A012"/>
      <stop offset="70%" style="stop-color:#B8860B"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </radialGradient>
    <!-- Highlight on top left -->
    <radialGradient id="highlight" cx="25%" cy="25%" r="40%">
      <stop offset="0%" style="stop-color:#FFF5CC;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FFE566;stop-opacity:0"/>
    </radialGradient>
    <!-- Inner ring gradient -->
    <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6914"/>
      <stop offset="50%" style="stop-color:#FFE566"/>
      <stop offset="100%" style="stop-color:#8B6914"/>
    </linearGradient>
    <!-- Text gradient for 3D effect -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6508"/>
      <stop offset="50%" style="stop-color:#6B4E08"/>
      <stop offset="100%" style="stop-color:#4A3506"/>
    </linearGradient>
    <!-- Edge shadow -->
    <radialGradient id="edgeShadow" cx="50%" cy="50%" r="50%">
      <stop offset="85%" style="stop-color:#B8860B;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#5C4306;stop-opacity:0.6"/>
    </radialGradient>
  </defs>
  
  <!-- Outer coin base -->
  <circle cx="16" cy="16" r="15" fill="url(#coinBase)"/>
  
  <!-- Edge shadow/depth -->
  <circle cx="16" cy="16" r="15" fill="url(#edgeShadow)"/>
  
  <!-- Top highlight -->
  <circle cx="16" cy="16" r="15" fill="url(#highlight)"/>
  
  <!-- Inner ring groove - shadow -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#7A5A0A" stroke-width="1.2"/>
  
  <!-- Inner ring groove - highlight -->
  <circle cx="16" cy="16" r="10.8" fill="none" stroke="#DDBB44" stroke-width="0.5"/>
  
  <!-- BG Text shadow -->
  <text x="16.3" y="20.3" font-family="Arial Black, Arial, sans-serif" font-size="10" font-weight="900" fill="#5C4306" fill-opacity="0.5" text-anchor="middle">BG</text>
  
  <!-- BG Text main -->
  <text x="16" y="20" font-family="Arial Black, Arial, sans-serif" font-size="10" font-weight="900" fill="url(#textGradient)" text-anchor="middle">BG</text>
</svg>
